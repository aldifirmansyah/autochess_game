<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Fighting Arena</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <div class="game-area">
            <canvas id="gameCanvas" width="1200" height="600"></canvas>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <h3>Blue Team</h3>
                <div class="fighter-buttons">
                </div>
            </div>

            <div class="team-info">
                <div class="team blue-team">
                    <h4>Blue Team</h4>
                    <div class="team-stats">
                        <span>Fighters: <span id="blue-count">0</span>/30</span>
                        <span>Gold: <span id="blue-gold">0</span> 💰</span>
                        <span id="blue-streak"></span>
                    </div>
                </div>
                <div class="team red-team">
                    <h4>Red Team</h4>
                    <div class="team-stats">
                        <span>Fighters: <span id="red-count">0</span>/30</span>
                        <span>Gold: <span id="red-gold">0</span> 💰</span>
                        <span id="red-streak"></span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h3>Red Team</h3>
                <div class="fighter-buttons">
                </div>
            </div>
        </div>
    </div>

    <!-- Mode Selection Modal -->
    <div id="mode-selection-modal" class="modal" style="display:block;">
        <div class="modal-content mode-modal-content">
            <h2>2D Fighting Arena</h2>
            <p>Choose your game mode</p>
            <div class="mode-buttons">
                <button class="mode-btn pvp-btn" onclick="window.game.selectGameMode('pvp')">
                    <span class="mode-icon">⚔️</span>
                    <span class="mode-title">PvP</span>
                    <span class="mode-desc">Both teams controlled by players</span>
                </button>
                <button class="mode-btn ai-btn" onclick="window.game.selectGameMode('ai')">
                    <span class="mode-icon">🤖</span>
                    <span class="mode-title">vs AI</span>
                    <span class="mode-desc">You play Blue, AI controls Red</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Fighter Selection Modal -->
    <div id="fighter-selection-modal" class="modal">
        <div class="modal-content">
            <h2>Select Your 5 Fighters</h2>
            <p id="selection-instruction">Blue Team's turn - Choose 5 fighters</p>

            <!-- Turn indicator -->
            <div class="turn-indicator">
                <div class="turn-step blue-turn active" id="blue-turn-indicator">
                    <span class="turn-icon">🔵</span>
                    <span class="turn-text">Blue Team</span>
                </div>
                <div class="turn-step red-turn" id="red-turn-indicator">
                    <span class="turn-icon">🔴</span>
                    <span class="turn-text">Red Team</span>
                </div>
            </div>

            <!-- Blue Team Selection -->
            <div class="team-selection active" id="blue-team-selection">
                <h3>Blue Team Selection</h3>
                <div class="fighter-grid" id="blue-fighter-grid">
                    <!-- Fighter options will be populated by JavaScript -->
                </div>
                <div class="selection-status" id="blue-selection-status">Selected: 0/5</div>
                <button id="blue-next-btn" class="next-btn" disabled>Next: Red Team</button>
            </div>

            <!-- Red Team Selection -->
            <div class="team-selection" id="red-team-selection">
                <h3>Red Team Selection</h3>
                <div class="fighter-grid" id="red-fighter-grid">
                    <!-- Fighter options will be populated by JavaScript -->
                </div>
                <div class="selection-status" id="red-selection-status">Selected: 0/5</div>
                <div class="selection-buttons">
                    <button id="red-back-btn" class="back-btn">Back: Blue Team</button>
                    <button id="start-battle-btn" class="start-battle-btn" disabled>Start Battle</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
